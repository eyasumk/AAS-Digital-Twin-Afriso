services:
  mongo:
    container_name: mongo
    image: mongo:7
    restart: unless-stopped
    # ports:
    #   - "27017:27017" //don't expose it outside.
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongoAdmin #need to save in env file
      MONGO_INITDB_ROOT_PASSWORD: mongoPassword #need to save in env file
    volumes:
      - ./data/mongodb:/data/db
    networks: 
      - backend
    healthcheck:
      test:
        ["CMD", "mongosh", "--username", "mongoAdmin", "--password", "mongoPassword", "--authenticationDatabase", "admin", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10

  aas-environment:
    container_name: aas-environment
    image: eclipsebasyx/aas-environment:2.0.0-milestone-05
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      BASYX_CORS_ALLOWED_ORIGINS: "http://localhost:3000" #need to save in env file
      BASYX_CORS_ALLOWED_METHODS: "GET,POST,PATCH,DELETE,PUT,OPTIONS,HEAD"
      SPRING_DATA_MONGODB_URI: "mongodb://mongoAdmin:mongoPassword@mongo:27017/aasenvironment?authSource=admin" #need to change mongoAdmin->${DB_USER} and mongoPassword->${DB_PASSWORD}
    # volumes:
    #   - ./basyx/application.properties:/application/application.properties:ro
    #   - ./aas:/application/aas:ro
    #   - ./basyx/rbac_rules.json:/config/rbac_rules.json:ro
    depends_on:
      mongo:
        condition: service_healthy
    networks: 
      - backend
      - frontend

  aas-ui:
    container_name: aas-web-ui
    image: eclipsebasyx/aas-gui:latest
    pull_policy: always #use the latest version of the image
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      ENDPOINT_CONFIG_AVAILABLE: "false"
      ALLOW_EDITING: "true"
      ALLOW_UPLOADING: "true"
      ALLOW_LOGOUT: "true"
      AAS_DISCOVERY_PATH: "http://localhost:8084"
      AAS_REGISTRY_PATH: "http://localhost:8083"
      SUBMODEL_REGISTRY_PATH: "http://localhost:8084"
      AAS_REPO_PATH: "http://localhost:8081"
      SUBMODEL_REPO_PATH: "http://localhost:8081"
      CD_REPO_PATH: "http://localhost:8081"
      SM_VIEWER_EDITOR: "true"
      START_PAGE_ROUTE_NAME: AASEditor
    volumes:
      - ./config/basyx-infra.yml:/basyx-infra.yml:ro
    depends_on:
      aas-environment:
        condition: service_started
    networks: 
      - frontend
  
  aas-registry:
    container_name: aas-registry
    image: eclipsebasyx/aas-registry-log-mongodb:2.0.0-milestone-13
    restart: unless-stopped
    ports:
      - "8083:8080"
    environment:
      SERVER_PORT: 8080
      SPRING_DATA_MONGODB_URI: "mongodb://mongoAdmin:mongoPassword@mongo:27017/aasregistry?authSource=admin" #need to change also
      BASYX_CORS_ALLOWED_ORIGINS: "http://localhost:3000" #need to save in env file
      BASYX_CORS_ALLOWED_METHODS: "GET,POST,PATCH,DELETE,PUT,OPTIONS,HEAD"
    # volumes:
      # - ./basyx/aas-registry.yml:/workspace/config/application.yml:ro
      # - ./basyx/static/swagger-initializer.js:/workspace/BOOT-INF/classes/META-INF/resources/webjars/swagger-ui/5.32.2/swagger-initializer.js
      # - ./basyx/rbac_rules_registry.json:/config/rbac_rules.json:ro
    depends_on:
      mongo:
        condition: service_healthy
    networks: 
      - backend
      - frontend

  submodel-registry:
    container_name: submodel-registry
    image: eclipsebasyx/submodel-registry-log-mongodb:2.0.0-SNAPSHOT
    restart: unless-stopped
    ports:
      - "8084:8080"
    environment:
      SERVER_PORT: 8080
      SPRING_DATA_MONGODB_URI: "mongodb://mongoAdmin:mongoPassword@mongo:27017/smregistry?authSource=admin" #need to change also .
      BASYX_CORS_ALLOWED_ORIGINS: "http://localhost:3000" #need to save in env file
      BASYX_CORS_ALLOWED_METHODS: "GET,POST,PATCH,DELETE,PUT,OPTIONS,HEAD"
    # volumes:
      # - ./basyx/submodel-registry.yml:/workspace/config/application.yml:ro
    depends_on:
      mongo:
        condition: service_healthy
    networks: 
      - backend
      - frontend
networks:
  backend:
  frontend:
